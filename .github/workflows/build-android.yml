name: Build Android APK

on:
  # Manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release
  # Auto trigger on push to main when Android files change
  push:
    branches: [main]
    paths:
      - "apps/android/**"
      - ".github/workflows/build-android.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK cmdline-tools
        run: |
          set -euo pipefail
          ANDROID_SDK_ROOT="$HOME/.android-sdk"
          CMDLINE_TOOLS_VERSION="12266719"
          ARCHIVE="commandlinetools-linux-${CMDLINE_TOOLS_VERSION}_latest.zip"
          URL="https://dl.google.com/android/repository/${ARCHIVE}"

          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          curl -fsSL "$URL" -o "/tmp/${ARCHIVE}"
          rm -rf "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          unzip -q "/tmp/${ARCHIVE}" -d "$ANDROID_SDK_ROOT/cmdline-tools"
          mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"

          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --licenses >/dev/null
          sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: 8.11.1

      - name: Build Debug APK
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == ''
        working-directory: apps/android
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Build Release APK (unsigned)
        if: github.event.inputs.build_type == 'release'
        working-directory: apps/android
        run: |
          # Build unsigned release APK by providing dummy signing via a temp keystore
          keytool -genkeypair -v -keystore /tmp/debug-keystore.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias openclaw -storepass android -keypass android \
            -dname "CN=Android,O=Debug,C=US"

          ./gradlew --no-daemon :app:assembleRelease \
            -POPENCLAW_ANDROID_STORE_FILE=/tmp/debug-keystore.jks \
            -POPENCLAW_ANDROID_STORE_PASSWORD=android \
            -POPENCLAW_ANDROID_KEY_ALIAS=openclaw \
            -POPENCLAW_ANDROID_KEY_PASSWORD=android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-apk
          path: apps/android/app/build/outputs/apk/**/*.apk
          retention-days: 30